<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChemSketcher</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <!--
      Ketcher / Indigo (and some of their deps) reference Node globals that
      don't exist in a browser. Shim them before any module loads, or the
      editor throws "process is not defined" and the app renders blank.
      Applies to both `vite dev` and the production build.
    -->
    <script>
      window.global = window.global || window;
      window.process = window.process || {
        env: { NODE_ENV: 'production' },
        browser: true,
        version: '',
        versions: {},
        nextTick: function (cb) { Promise.resolve().then(cb); },
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
